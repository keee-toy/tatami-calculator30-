<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絨毯 畳数・金額計算</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#f2f2f2;
  padding:16px;
  margin:0;
}

h2 {
  margin-bottom:12px;
}

.box {
  background:#fff;
  padding:16px;
  border-radius:10px;
  margin-bottom:12px;
}

select,
input,
button {
  width:100%;
  font-size:16px;
  padding:10px;
  margin-top:6px;
  box-sizing:border-box;
}

button {
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#007aff;
  color:#fff;
}

.result {
  line-height:1.8;
  font-size:16px;
}

strong {
  font-size:17px;
}

.button-group {
  display:flex;
  gap:10px;
}

/* ロック画面 */
#lockScreen {
  min-height:100vh;
  margin:-16px;
  padding:16px;
  box-sizing:border-box;

  background-image:url("lock-bg.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  align-items:center;
  justify-content:center;
}

.lock-box {
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 30px rgba(0,0,0,0.18);
}

.lock-box h2 {
  text-align:center;
  margin-top:0;
}

#app {
  display:none;
}

.error {
  color:#d00;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="lockScreen">
  <div class="lock-box">
    <h2>ロック解除</h2>
    <label>パスコード</label>
    <input type="password" id="pinInput" inputmode="numeric" placeholder="4桁のPIN">
    <button id="unlockBtn">解除</button>
    <div id="pinError" class="error"></div>
  </div>
</div>

<div id="app">

<h2>絨毯 畳数・金額計算</h2>

<div class="box">
  <label>店舗</label>
  <select id="shopSelect"></select>

  <label>種類</label>
  <select id="typeSelect"></select>
</div>

<div class="box">
  <label>縦（cm）</label>
  <input type="number" id="length">

  <label>横（cm）</label>
  <input type="number" id="width">
</div>

<div class="box result" id="result">
  数値を入力してください
</div>

<div class="box">
  <div class="button-group">
    <button id="discountBtn">割引ボタン</button>
    <button id="discount30Btn">3割引き</button>
  </div>

  <div id="discountSelectBox" style="display:none; margin-top:12px;">
    <label>割引率</label>
    <select id="discountSelect">
      <option value="">選択してください</option>
      <option value="0.1">1割引き</option>
      <option value="0.2">2割引き</option>
      <option value="0.3">3割引き</option>
      <option value="0.4">4割引き</option>
      <option value="0.5">5割引き</option>
    </select>
  </div>
</div>

<div class="box result" id="discountResult" style="display:none;"></div>

</div>

<script>
const PIN_CODE = "3579";
const UNLOCK_KEY = "carpetAppUnlockedDate";

const lockScreen = document.getElementById("lockScreen");
const app = document.getElementById("app");
const pinInput = document.getElementById("pinInput");
const unlockBtn = document.getElementById("unlockBtn");
const pinError = document.getElementById("pinError");

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}

function showApp() {
  lockScreen.style.display = "none";
  app.style.display = "block";
}

function checkDailyUnlock() {
  if (localStorage.getItem(UNLOCK_KEY) === getTodayKey()) {
    showApp();
  }
}

unlockBtn.addEventListener("click", () => {
  if (pinInput.value === PIN_CODE) {
    localStorage.setItem(UNLOCK_KEY, getTodayKey());
    showApp();
  } else {
    pinError.textContent = "パスコードが違います";
    pinInput.value = "";
  }
});

pinInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    unlockBtn.click();
  }
});

checkDailyUnlock();

const SHOPS = {
  musashiya: {
    name: "武蔵屋",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常", price: 1000 },
      wool: { label: "ウール・シルク・レーヨン", price: 1150 },
      electric: { label: "電気カーペット", price: 1150 },
      dantsu: { label: "段通", price: 2300 }
    }
  },
  royal: {
    name: "ロイヤル",
    baseType: "retail",
    taxIncluded: true,
    types: {
      normal: { label: "通常", price: 1700 },
      persian: { label: "ペルシャ・段通", price: 4300 },
      mat: { label: "段通マット", price: 4300 }
    }
  },
  kikusuisha: {
    name: "菊水舎",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常", price: 800 },
      shaggy: { label: "シャギー・ラグ", price: 800 },
      wool: { label: "ウール・シルク・レーヨン", price: 1000 },
      electric: { label: "電気カーペット", price: 1000 },
      dantsu: { label: "段通", price: 2000 },
      persian: { label: "ペルシャ", price: 5000 },
      mat: { label: "マット", price: 600 },
      silkmat: { label: "シルクマット・段通マット", price: 1200 }
    }
  },
  koyanagi: {
    name: "小柳商事",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常", price: 900 },
      shaggy: { label: "シャギー・ラグ", price: 1140 },
      wool: { label: "ウール・シルク・レーヨン", price: 1140 },
      electric: { label: "電気カーペット", price: 1300 },
      dantsu: { label: "段通", price: 2300 },
      mat: { label: "マット", price: 800 },
      dantsumat: { label: "段通マット", price: 1300 }
    }
  },
  otaki: {
    name: "大滝",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常", price: 800 },
      wool: { label: "ウール・シルク・レーヨン", price: 1150 },
      shaggy: { label: "シャギー・ラグ", price: 1030 },
      mat: { label: "マット", price: 920 },
      dantsumat: { label: "段通マット", price: 1150 }
    }
  },
  general: {
    name: "一般",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常", price: 800 }
    }
  },
  diamonddry: {
    name: "ダイヤドライ",
    baseType: "cost",
    taxIncluded: false,
    types: {
      normal: { label: "通常（水洗い）", price: 800 },
      carpet: { label: "絨毯", price: 1150 },
      rug: { label: "ラグ", price: 950 }
    }
  }
};

const shopSelect = document.getElementById("shopSelect");
const typeSelect = document.getElementById("typeSelect");
const lengthInput = document.getElementById("length");
const widthInput = document.getElementById("width");
const result = document.getElementById("result");

const discountBtn = document.getElementById("discountBtn");
const discount30Btn = document.getElementById("discount30Btn");
const discountSelectBox = document.getElementById("discountSelectBox");
const discountSelect = document.getElementById("discountSelect");
const discountResult = document.getElementById("discountResult");

Object.entries(SHOPS).forEach(([key, shop]) => {
  const opt = document.createElement("option");
  opt.value = key;
  opt.textContent = shop.name;
  shopSelect.appendChild(opt);
});

function updateTypes() {
  const shop = SHOPS[shopSelect.value];
  typeSelect.innerHTML = "";

  Object.entries(shop.types).forEach(([k, t]) => {
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = t.label;
    typeSelect.appendChild(opt);
  });

  calc();
}

function roundTatami(t) {
  const b = Math.floor(t);
  const d = t - b;

  if (d < 0.25) return b;
  if (d < 0.65) return b + 0.5;
  return b + 1;
}

function normalizeToCost(price, shop) {
  let p = price;

  if (shop.taxIncluded) p /= 1.1;
  if (shop.baseType === "retail") p /= 2;

  return p;
}

function getBaseValues() {
  const l = +lengthInput.value;
  const w = +widthInput.value;

  if (!l || !w) return null;

  const area = (l * w) / 10000;
  const tatami = area / 1.62;
  const order = roundTatami(tatami);

  const shop = SHOPS[shopSelect.value];
  const type = shop.types[typeSelect.value];

  const cost = order * normalizeToCost(type.price, shop);
  const costTax = cost * 1.1;
  const retail = cost * 2;
  const retailTax = retail * 1.1;

  return {
    area,
    tatami,
    order,
    cost,
    costTax,
    retail,
    retailTax
  };
}

function calc() {
  const data = getBaseValues();

  if (!data) {
    result.innerHTML = "数値を入力してください";
    discountResult.style.display = "none";
    discountResult.innerHTML = "";
    return;
  }

  result.innerHTML = `
    面積：${data.area.toFixed(2)}㎡<br>
    実畳数：${data.tatami.toFixed(2)}畳<br>
    <strong>発注畳数：${data.order.toFixed(1)}畳</strong><br><br>

    下代（税抜）：${Math.round(data.cost).toLocaleString()}円<br>
    下代（税込）：${Math.round(data.costTax).toLocaleString()}円<br>
    <strong>上代（税抜）：${Math.round(data.retail).toLocaleString()}円</strong><br>
    <strong>上代（税込）：${Math.round(data.retailTax).toLocaleString()}円</strong>
  `;

  discountResult.style.display = "none";
  discountResult.innerHTML = "";
}

function showDiscount(rate) {
  const data = getBaseValues();

  if (!data) return;

  const multiplier = 1 - rate;

  const cost = data.cost * multiplier;
  const costTax = data.costTax * multiplier;
  const retail = data.retail * multiplier;
  const retailTax = data.retailTax * multiplier;

  discountResult.style.display = "block";

  discountResult.innerHTML = `
    <strong>${rate * 10}割引き後</strong><br><br>

    下代（税抜）：${Math.round(cost).toLocaleString()}円<br>
    下代（税込）：${Math.round(costTax).toLocaleString()}円<br>
    <strong>上代（税抜）：${Math.round(retail).toLocaleString()}円</strong><br>
    <strong>上代（税込）：${Math.round(retailTax).toLocaleString()}円</strong>
  `;
}

discountBtn.addEventListener("click", () => {
  discountSelectBox.style.display = "block";
});

discountSelect.addEventListener("change", () => {
  if (!discountSelect.value) return;
  showDiscount(+discountSelect.value);
});

discount30Btn.addEventListener("click", () => {
  discountSelectBox.style.display = "none";
  discountSelect.value = "";
  showDiscount(0.3);
});

shopSelect.addEventListener("change", updateTypes);
typeSelect.addEventListener("change", calc);

[lengthInput, widthInput].forEach(el => {
  el.addEventListener("input", calc);
});

updateTypes();
</script>

</body>
</html>
